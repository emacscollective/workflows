name: 'Test'
permissions: {}
on:
  workflow_call:
    inputs:
      workflow_ref:
        description: 'Must be the same as "uses: ...@THIS"'
        default: main
        required: false
        type: string
env:
  pwd: ${{ github.event.repository.name }}
jobs:
  matrix:
    name: 'Get matrix'
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: 'Install Emacs'
        uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # > v7
        with:
          version: 30.1
      - name: 'Install scripts'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: emacscollective/workflows
          ref: ${{ inputs.workflow_ref }}
          path: _scripts
          persist-credentials: false
      - name: 'Checkout ${{ github.repository }}'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.pwd }}
          persist-credentials: false
      - name: 'Get matrix'
        id: matrix
        working-directory: ${{ env.pwd }}
        env:
          WORKFLOW_REF: ${{ inputs.workflow_ref }}
        run: |
          ../_scripts/bin/get-matrix >> $GITHUB_OUTPUT
          echo "• get-matrix: emacscollective/workflows@${WORKFLOW_REF}"
  main:
    name: 'Testing using Emacs ${{ matrix.emacs }}'
    runs-on: ubuntu-24.04
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        emacs: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: 'Configure git'
        run: |
          git config --global user.name "A U Thor"
          git config --global user.email a.u.thor@example.com
      - name: 'Install Emacs'
        uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # > v7
        with:
          version: ${{ matrix.emacs }}
      - name: 'Install scripts'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: emacscollective/workflows
          ref: ${{ inputs.workflow_ref }}
          path: _scripts
          persist-credentials: false
      - name: 'Checkout ${{ github.repository }}'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.pwd }}
          fetch-depth: 0
          persist-credentials: false
      - name: 'Install dependencies'
        working-directory: ${{ env.pwd }}
        run: |
          ../_scripts/bin/install-deps
      - name: 'Compile'
        working-directory: ${{ env.pwd }}
        run: |
          touch check-declare
          make lisp
      - name: 'Test'
        working-directory: ${{ env.pwd }}
        run: |
          make test
